version: 2
updates:
  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /server
    schedule:
      interval: weekly
      day: monday
      time: "04:15"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 3
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
